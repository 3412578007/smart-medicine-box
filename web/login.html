<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 智能药盒系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#f0f2f5;display:flex;align-items:center;justify-content:center;height:100vh}
        .login-box{width:400px;background:#fff;padding:40px;border-radius:12px;box-shadow:0 0 12px #00000010}
        h2{text-align:center;margin-bottom:30px;color:#2c3e50}
        .input-item{margin-bottom:20px}
        input{width:100%;height:44px;padding:0 15px;border:1px solid #ddd;border-radius:6px;font-size:15px}
        button{width:100%;height:46px;background:#3498db;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
        button:hover{background:#2980b9}
        .tip{color:red;text-align:center;margin-top:10px;height:20px}
        .link{text-align:center;margin-top:20px}
        .link a{color:#3498db;text-decoration:none}
        .link a:hover{text-decoration:underline}
    </style>
</head>
<body>
<div class="login-box">
    <h2>智能药盒管理系统</h2>
    <div class="input-item">
        <input type="text" id="username" placeholder="账号">
    </div>
    <div class="input-item">
        <input type="password" id="pwd" placeholder="密码">
    </div>
    <button onclick="login()">登录</button>
    <div class="tip" id="msg"></div>
    <div class="link">
        还没有账号？<a href="register.html">立即注册</a>
    </div>
</div>

<script>
async function login(){
    let username = document.getElementById("username").value
    let password = document.getElementById("pwd").value
    let msgEl = document.getElementById("msg")

    if(!username || !password){
        msgEl.innerText = "请输入账号和密码"
        return
    }

    try{
        let res = await fetch(`http://localhost:8080/api/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
            method: "POST"
        })
        let data = await res.json()

        if(data.success){
            localStorage.setItem("role", data.role)
            localStorage.setItem("username", data.username)
            location.href = "index.html"
        } else {
            msgEl.innerText = data.msg || "登录失败"
        }
    } catch(e){
        msgEl.innerText = "连接服务器失败"
        console.error(e)
    }
}
</script>
</body>
</html>
