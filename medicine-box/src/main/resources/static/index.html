<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>中老年智能药盒物联网监控平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 30px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            font-size: 28px;
        }
        .logout-btn {
            padding: 8px 20px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #7f8c8d;
        }
        .tip {
            margin-bottom: 25px;
            font-size: 16px;
            color: #34495e;
        }
        .grid-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card h2 {
            font-size: 20px;
            color: #3498db;
            margin-bottom: 16px;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        .state-item {
            margin: 10px 0;
            font-size: 16px;
            color: #2c3e50;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-open { background: #3498db; }
        .btn-remind { background: #e67e22; }
        .btn-clear { background: #c0392b; margin-top:12px; width:100%; }
        .btn-connect { background: #27ae60; }
        .status-connected { color: #27ae60; font-weight: bold; }
        .status-disconnected { color: #e74c3c; font-weight: bold; }
        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            margin-right: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        th,td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            color: #2c3e50;
        }
        .ok {
            color: #27ae60;
            font-weight: bold;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #27ae60; }
        .toast-error { background: #e74c3c; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .no-permission {
            text-align: center;
            color: #95a5a6;
            padding: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>中老年智能药盒物联网监控平台</h1>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
    <div class="tip" id="roleTip">加载中...</div>

    <div class="grid-box" id="adminOnly">
        <div class="card">
            <h2>药盒实时状态</h2>
            <div class="state-item">
                设备状态: 
                <span id="deviceStatus" class="status-disconnected">未连接</span>
            </div>
            <div class="state-item">当前时间: <span id="nowTime">--:--:--</span></div>
            <div class="state-item">携带状态: <span id="carryStatus" style="color:#27ae60">正常随身携带</span></div>
            <div class="state-item">服药状态: <span style="color:#27ae60">已完成</span></div>
        </div>

        <div class="card">
            <h2>蓝牙连接</h2>
            <div class="state-item">
                <select id="portSelect">
                    <option value="">选择串口</option>
                </select>
                <button class="btn-connect" onclick="connectBluetooth()">连接</button>
            </div>
            <div class="state-item" id="connectionInfo"></div>
        </div>

        <div class="card">
            <h2>远程控制</h2>
            <div class="btn-group">
                <button class="btn-open" id="btnOpen" onclick="apiOpen()">远程开盖</button>
                <button class="btn-remind" id="btnRemind" onclick="apiRemind()">触发提醒</button>
            </div>
            <button class="btn-clear" id="clearBtn" onclick="apiClear()">清空全部日志</button>
        </div>

        <div class="card">
            <h2>药品信息</h2>
            <div class="state-item">药品: 降压药</div>
            <div class="state-item">每日2次</div>
            <div class="state-item">
                剩余: <span class="medicine-count">18</span>份
                <input type="number" id="newMedicineCount" min="0" placeholder="修改药量" style="width:80px; margin-left:10px;">
                <button class="btn btn-green" onclick="setMedicineCount()" style="padding:5px 10px; font-size:12px;">修改</button>
            </div>
        </div>
    </div>

    <div class="card" id="logSection">
        <h2>系统完整日志（永久保存）</h2>
        <div id="logTableWrapper">
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>事件类型</th>
                        <th>内容</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let role = localStorage.getItem("role");
let username = localStorage.getItem("username");

if(!role) {
    location.href = "login.html";
}

let tip = document.getElementById("roleTip");
let isConnected = false;

if(role === "admin") {
    tip.innerText = `当前用户：${username}（管理员）- 全部权限`;
} else {
    tip.innerText = `当前用户：${username}（普通用户）- 仅查看`;
    // 隐藏管理员功能（远程控制和蓝牙连接）
    document.getElementById("adminOnly").innerHTML = `
        <div class="card">
            <h2>药盒实时状态</h2>
            <div class="state-item">
                设备状态: 
                <span id="deviceStatus" class="status-disconnected">未连接</span>
            </div>
            <div class="state-item">当前时间: <span id="nowTime">--:--:--</span></div>
            <div class="state-item">携带状态: <span id="carryStatus" style="color:#27ae60">正常随身携带</span></div>
            <div class="state-item">服药状态: <span style="color:#27ae60">已完成</span></div>
        </div>
        <div class="card">
            <h2>药品信息</h2>
            <div class="state-item">药品: 降压药</div>
            <div class="state-item">每日2次</div>
            <div class="state-item">剩余: <span class="medicine-count">18</span>份</div>
        </div>
    `;
    document.getElementById("logSection").innerHTML = `
        <h2>系统日志（只读）</h2>
        <div id="logTableWrapper">
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>事件类型</th>
                        <th>内容</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
    `;
}

// 退出登录
function logout() {
    localStorage.removeItem("role");
    localStorage.removeItem("username");
    location.href = "login.html";
}

// 实时时间
function updateTime() {
    let d = new Date();
    let t = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0') + ":" + String(d.getSeconds()).padStart(2, '0');
    document.getElementById("nowTime").innerText = t;
}
setInterval(updateTime, 1000);
updateTime();

// 显示提示消息
function showToast(msg, isSuccess) {
    const toast = document.createElement('div');
    toast.className = 'toast ' + (isSuccess ? 'toast-success' : 'toast-error');
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// 更新按钮状态
function updateButtonStatus() {
    const buttons = ['btnOpen', 'btnRemind'];
    buttons.forEach(id => {
        const btn = document.getElementById(id);
        if (btn) btn.disabled = !isConnected || role !== 'admin';
    });
}

// 获取状态
async function checkStatus() {
    if (role !== 'admin') return;
    
    try {
        let res = await fetch("http://localhost:8080/api/status");
        let data = await res.json();
        isConnected = data.connected;
        
        const statusEl = document.getElementById("deviceStatus");
        statusEl.textContent = isConnected ? "已连接" : "未连接";
        statusEl.className = isConnected ? "status-connected" : "status-disconnected";
        
        // 更新串口列表
        const portSelect = document.getElementById("portSelect");
        const currentValue = portSelect.value;
        portSelect.innerHTML = '<option value="">选择串口</option>';
        if (data.ports && data.ports.length > 0) {
            data.ports.forEach(port => {
                const option = document.createElement('option');
                option.value = port;
                option.textContent = port;
                if (port === currentValue) option.selected = true;
                portSelect.appendChild(option);
            });
        }
        
        document.getElementById("connectionInfo").textContent = 
            isConnected ? "蓝牙串口已连接，可以进行远程控制" : "请选择串口并连接";
        
        updateButtonStatus();
        
        // 更新药量
        if (data.medicineCount !== undefined) {
            updateMedicineCount(data.medicineCount);
        }
        
        // 更新携带状态
        const carryStatusEl = document.getElementById("carryStatus");
        if (carryStatusEl && data.isLost !== undefined) {
            if (data.isLost) {
                carryStatusEl.textContent = "药盒丢失";
                carryStatusEl.style.color = "#e74c3c";
            } else {
                carryStatusEl.textContent = "正常随身携带";
                carryStatusEl.style.color = "#27ae60";
            }
        }
    } catch (e) {
        console.error(e);
    }
}

// 连接蓝牙
async function connectBluetooth() {
    if (role !== 'admin') return;
    
    const port = document.getElementById("portSelect").value;
    try {
        let url = "http://localhost:8080/api/connect?role=" + role;
        if (port) url += "&port=" + encodeURIComponent(port);
        
        let res = await fetch(url, { method: "POST" });
        let data = await res.json();
        
        if (data.success) {
            showToast("连接成功！", true);
        } else {
            showToast(data.msg || "连接失败", false);
        }
        
        await checkStatus();
    } catch (e) {
        showToast("连接异常", false);
        console.error(e);
    }
}

// 加载日志
async function loadLog() {
    try {
        let res = await fetch("http://localhost:8080/api/logs?role=" + role);
        let result = await res.json();
        
        if (result.success && result.data) {
            let html = "";
            result.data.forEach(i => {
                html += `<tr><td>${i.time}</td><td>${i.type}</td><td>${i.content}</td><td class="ok">✓已记录</td></tr>`;
            });
            document.getElementById("logTable").innerHTML = html;
        } else {
            document.getElementById("logTableWrapper").innerHTML = 
                `<div class="no-permission">${result.msg || "加载日志失败"}</div>`;
        }
    } catch (e) {
        console.error(e);
        document.getElementById("logTableWrapper").innerHTML = 
            `<div class="no-permission">加载日志失败</div>`;
    }
}

// 接口调用
async function apiTakeMedicine() {
    let res = await fetch("http://localhost:8080/api/take-medicine?role=" + role, { method: "POST" });
    let data = await res.json();
    showToast(data.msg || "操作完成", data.success);
    if (data.success) loadLog();
}

async function apiOpen() {
    if (role !== 'admin') return;
    
    let res = await fetch("http://localhost:8080/api/open?role=" + role, { method: "POST" });
    let data = await res.json();
    showToast(data.msg || "操作完成", data.success);
    if (data.success) {
        loadLog();
        // 更新药量显示
        if (data.medicineCount !== undefined) {
            updateMedicineCount(data.medicineCount);
        }
    }
}

function updateMedicineCount(count) {
    // 更新所有显示药量的元素
    const elements = document.querySelectorAll('.medicine-count');
    elements.forEach(el => {
        el.textContent = count;
    });
}

async function setMedicineCount() {
    if (role !== 'admin') {
        showToast("只有管理员能修改药量", false);
        return;
    }
    
    let countInput = document.getElementById('newMedicineCount');
    let count = parseInt(countInput.value);
    
    if (isNaN(count) || count < 0) {
        showToast("请输入有效的药量", false);
        return;
    }
    
    let res = await fetch("http://localhost:8080/api/set-medicine-count?role=" + role + "&count=" + count, { method: "POST" });
    let data = await res.json();
    showToast(data.msg || "操作完成", data.success);
    if (data.success) {
        loadLog();
        // 更新药量显示
        if (data.medicineCount !== undefined) {
            updateMedicineCount(data.medicineCount);
        }
        // 清空输入框
        countInput.value = '';
    }
}

async function apiRemind() {
    if (role !== 'admin') return;
    
    let res = await fetch("http://localhost:8080/api/remind?role=" + role, { method: "POST" });
    let data = await res.json();
    showToast(data.msg || "操作完成", data.success);
    if (data.success) loadLog();
}

async function apiClear() {
    if (role !== 'admin') return;
    
    if (confirm("确定清空全部日志？")) {
        let res = await fetch("http://localhost:8080/api/clear?role=" + role, { method: "DELETE" });
        let data = await res.json();
        showToast(data.msg || "操作完成", data.success);
        if (data.success) loadLog();
    }
}

// 获取药量
async function fetchMedicineCount() {
    try {
        let res = await fetch("http://localhost:8080/api/medicine-count");
        let data = await res.json();
        if (data.success && data.count !== undefined) {
            updateMedicineCount(data.count);
        }
    } catch (e) {
        console.error(e);
    }
}

// 初始化
if (role === 'admin') {
    checkStatus();
    loadLog();
    setInterval(checkStatus, 5000);
    setInterval(loadLog, 5000); // 每5秒刷新日志（检测按键事件）
} else {
    // 普通用户也可以查看状态和日志
    loadLog();
    fetchMedicineCount();
    setInterval(loadLog, 5000); // 每5秒刷新日志（检测按键事件）
    setInterval(fetchMedicineCount, 5000); // 每5秒刷新药量
}
</script>
</body>
</html>
