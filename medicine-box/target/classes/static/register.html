<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册 - 智能药盒系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#f0f2f5;display:flex;align-items:center;justify-content:center;height:100vh}
        .register-box{width:400px;background:#fff;padding:40px;border-radius:12px;box-shadow:0 0 12px #00000010}
        h2{text-align:center;margin-bottom:30px;color:#2c3e50}
        .input-item{margin-bottom:20px}
        input{width:100%;height:44px;padding:0 15px;border:1px solid #ddd;border-radius:6px;font-size:15px}
        button{width:100%;height:46px;background:#27ae60;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
        button:hover{background:#219a52}
        .tip{color:red;text-align:center;margin-top:10px;height:20px}
        .tip.success{color:#27ae60}
        .link{text-align:center;margin-top:20px}
        .link a{color:#3498db;text-decoration:none}
        .link a:hover{text-decoration:underline}
    </style>
</head>
<body>
<div class="register-box">
    <h2>用户注册</h2>
    <div class="input-item">
        <input type="text" id="username" placeholder="请输入账号">
    </div>
    <div class="input-item">
        <input type="password" id="pwd" placeholder="请输入密码">
    </div>
    <div class="input-item">
        <input type="password" id="confirmPwd" placeholder="请确认密码">
    </div>
    <button onclick="register()">注册</button>
    <div class="tip" id="msg"></div>
    <div class="link">
        已有账号？<a href="login.html">立即登录</a>
    </div>
</div>

<script>
async function register(){
    let username = document.getElementById("username").value
    let password = document.getElementById("pwd").value
    let confirmPwd = document.getElementById("confirmPwd").value
    let msgEl = document.getElementById("msg")

    msgEl.className = "tip"
    if(!username || !password){
        msgEl.innerText = "请输入账号和密码"
        return
    }
    if(password !== confirmPwd){
        msgEl.innerText = "两次密码输入不一致"
        return
    }
    if(password.length < 3){
        msgEl.innerText = "密码长度至少3位"
        return
    }

    try{
        let res = await fetch(`http://localhost:8080/api/register?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, {
            method: "POST"
        })
        let data = await res.json()

        if(data.success){
            msgEl.className = "tip success"
            msgEl.innerText = data.msg
            setTimeout(() => {
                location.href = "login.html"
            }, 1500)
        } else {
            msgEl.innerText = data.msg || "注册失败"
        }
    } catch(e){
        msgEl.innerText = "连接服务器失败"
        console.error(e)
    }
}
</script>
</body>
</html>
